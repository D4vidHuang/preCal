# Full v1 overrides: 8+ GPU production run.
# Layered ON TOP of configs/default.yaml by the CLI. Matches the spec's fullV1 block.

run:
  name: precal-v1

corpus:
  languages: [python, java, javascript, php, go, ruby]  # full 6-lang slice
  max_files_per_lang: 100000            # v1 cap to fit CoReFusion scratch (~143G); tunable

shard:
  target_chunks: 50000                  # ~3-4 shards/lang -> good 8-GPU array parallelism

model:
  id: Qwen/Qwen3-Embedding-4B
  dtype: bfloat16                       # auto-forced to float16 under TEI
  embed_dim: 2560

engine:
  name: tei
  image: ghcr.io/huggingface/text-embeddings-inference:120-1.9
  replicas_per_gpu: 2                   # 4B x2 = ~16GB weights; concurrent client + failover
  max_batch_tokens: 16384

index:
  factory_full: OPQ64_256,IVF4096,PQ64  # nlist sized for ~1M vectors (v1 cap); IVF65536 was for 15-40M
  train_sample: 2000000                  # code clamps to N available
  merge: ondisk

eval:
  benchmark: coir-csn
  ks: [1, 5, 10, 100]
